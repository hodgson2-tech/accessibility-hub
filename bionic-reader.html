<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionic Reading Formatter</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        textarea { width: 100%; height: 150px; margin-bottom: 20px; padding: 10px; border-radius: 4px; border: 1px solid var(--primary-color); font-size: 16px; box-sizing: border-box; background: var(--bg-color); color: var(--text-color); }
        .action-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-row button { flex: 1; padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: var(--primary-color); color: white; font-weight: bold; }
        .copy-btn { background-color: #6c757d !important; }
        .copy-btn:hover { background-color: #5a6268 !important; }
        #output-container { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: var(--card-shadow); min-height: 100px; font-size: 18px; line-height: 1.6; white-space: pre-wrap; color: var(--text-color); border: 1px solid var(--border-color); }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('hub-theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
        if (localStorage.getItem('hub-font') && localStorage.getItem('hub-font') !== 'default') document.body.classList.add(localStorage.getItem('hub-font'));
    </script>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="container">
        <a href="index.html" style="display: block; margin-bottom: 20px; color: var(--primary-color); text-decoration: none; font-weight: bold;">&larr; Back to Hub</a>

        <main id="main-content">
            <h1>Bionic Reading Formatter</h1>
            <p>Paste your text below to add visual anchor points that guide your eyes.</p>

            <label for="input-text" style="font-weight: bold; display: block; margin-bottom: 6px;">Your text:</label>
            <textarea id="input-text" placeholder="Paste your text here..."></textarea>

            <div class="action-row no-print">
                <button id="format-btn">Format Text</button>
                <button id="copy-btn" class="copy-btn" aria-label="Copy formatted text to clipboard">Copy Output</button>
                <button id="print-btn" style="background-color:#28a745;" aria-label="Print or save as PDF">Print / PDF</button>
            </div>

            <div
                id="output-container"
                role="region"
                aria-label="Bionic-formatted text output"
                aria-live="polite"
                aria-atomic="true"
            >Your formatted text will appear here...</div>
        </main>
    </div>

    <script src="js/word-predict.js"></script>
<script>
    document.getElementById('print-btn').addEventListener('click', () => window.print());

    // Escape a single character for safe HTML injection
    function escapeChar(ch) {
        switch (ch) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            default: return ch;
        }
    }

    const formatBtn = document.getElementById('format-btn');
    const copyBtn = document.getElementById('copy-btn');
    const outputContainer = document.getElementById('output-container');

    formatBtn.addEventListener('click', () => {
        const text = document.getElementById('input-text').value;
        if (!text.trim()) {
            outputContainer.innerHTML = "Please paste some text first.";
            return;
        }

        const formattedText = text.split(/(\s+)/).map(word => {
            if (!word.trim()) return escapeChar(word) || word.replace(/./g, ch => escapeChar(ch));
            const alphaNumeric = word.replace(/[^a-zA-Z0-9]/g, '');
            if (alphaNumeric.length === 0) {
                // No alphanumeric chars — just escape and return
                return word.split('').map(escapeChar).join('');
            }
            const boldLen = Math.ceil(alphaNumeric.length / 2);
            let count = 0;
            let boldClosed = false;
            let result = '<b>';
            for (let i = 0; i < word.length; i++) {
                const ch = word[i];
                const isAlphaNum = /[a-zA-Z0-9]/.test(ch);
                if (isAlphaNum) count++;
                result += escapeChar(ch);
                if (!boldClosed && count === boldLen) {
                    result += '</b>';
                    boldClosed = true;
                }
            }
            if (!boldClosed) result += '</b>';
            return result;
        }).join('');

        outputContainer.innerHTML = formattedText;
    });

    copyBtn.addEventListener('click', () => {
        const text = outputContainer.innerText || outputContainer.textContent;
        if (!text || text === 'Your formatted text will appear here...') return;
        navigator.clipboard.writeText(text).then(() => {
            const original = copyBtn.textContent;
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = original; }, 1500);
        }).catch(() => {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = 'Copy Output'; }, 1500);
        });
    });
</script>
</body>
</html>
