<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyslexia-Friendly Document Converter</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .controls {
            background: var(--card-bg); padding: 20px; border-radius: 8px;
            box-shadow: var(--card-shadow);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; margin-bottom: 20px; border: 1px solid var(--border-color);
        }
        .control-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; color: var(--text-color); }
        select {
            padding: 8px; border: 1px solid var(--primary-color); border-radius: 4px;
            font-size: 14px; width: 100%; background: var(--bg-color); color: var(--text-color);
        }
        textarea {
            width: 100%; height: 150px; margin-bottom: 20px; padding: 10px;
            border-radius: 4px; border: 1px solid var(--primary-color); font-size: 16px;
            box-sizing: border-box; background: var(--bg-color); color: var(--text-color);
        }
        #output-container {
            background: #fffff8; padding: 40px; border-radius: 8px;
            box-shadow: var(--card-shadow); min-height: 200px;
            font-size: 18px; line-height: 1.5; letter-spacing: normal;
            white-space: pre-wrap; color: #222;
        }
        [data-theme="dark"] #output-container { color: #e0e0e0; }
        .action-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .action-row button {
            padding: 8px 16px; font-size: 14px; cursor: pointer; border: none;
            border-radius: 4px; background-color: #6c757d; color: white;
            font-weight: bold; white-space: nowrap;
        }
        .action-row button:hover { background-color: #5a6268; }
        .print-btn { background-color: #28a745 !important; }
        .print-btn:hover { background-color: #1e7e34 !important; }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('hub-theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
        if (localStorage.getItem('hub-font') && localStorage.getItem('hub-font') !== 'default') document.body.classList.add(localStorage.getItem('hub-font'));
    </script>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="container">
        <a href="index.html" style="display: block; margin-bottom: 20px; color: var(--primary-color); text-decoration: none; font-weight: bold;">&larr; Back to Hub</a>

        <main id="main-content">
            <h1>Dyslexia-Friendly Document Converter</h1>
            <p>Paste text below to strip complex formatting and instantly apply readability standards.</p>

            <label for="input-text" style="font-weight: bold; display: block; margin-bottom: 6px;">Your text:</label>
            <textarea id="input-text" placeholder="Paste document or exam text here..."></textarea>

            <div class="controls">
                <div class="control-group">
                    <label for="font-select">Font Style</label>
                    <select id="font-select">
                        <option value="'Comic Sans MS', 'Chalkboard SE', sans-serif">Comic Sans</option>
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                        <option value="'Lexend', sans-serif">Lexend</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="spacing-select">Letter Spacing</label>
                    <select id="spacing-select">
                        <option value="normal">Normal</option>
                        <option value="1.5px">Wide</option>
                        <option value="3px">Extra Wide</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="line-height-select">Line Height</label>
                    <select id="line-height-select">
                        <option value="1.5">1.5 (Standard)</option>
                        <option value="2.0">2.0 (Double)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="font-size-select">Text Size</label>
                    <select id="font-size-select">
                        <option value="16px">Small (16px)</option>
                        <option value="18px" selected>Medium (18px)</option>
                        <option value="22px">Large (22px)</option>
                        <option value="26px">X-Large (26px)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="tint-select">Page Tint</label>
                    <select id="tint-select">
                        <option value="#fffff8">Soft Cream</option>
                        <option value="#eef2f5">Pale Blue</option>
                        <option value="#f0f5ec">Mint Green</option>
                        <option value="#fff5f5">Soft Rose</option>
                        <option value="#ffffff">Pure White</option>
                    </select>
                </div>
            </div>

            <!-- TTS controls auto-rendered by tts.js -->
            <div class="tts-controls no-print" data-target="output-container"></div>

            <div class="action-row no-print">
                <button id="copy-btn" aria-label="Copy formatted text to clipboard">Copy Output</button>
                <button id="print-btn" class="print-btn" aria-label="Print or save as PDF">Print / PDF</button>
            </div>

            <div
                id="output-container"
                class="tts-target"
                style="font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;"
                role="region"
                aria-label="Dyslexia-friendly formatted text output"
                aria-live="polite"
                aria-atomic="true"
            >Your standardized text will appear here...</div>
        </main>
    </div>

    <script src="js/tts.js"></script>
    <script src="js/word-predict.js"></script>
<script>
    const inputText = document.getElementById('input-text');
    const outputContainer = document.getElementById('output-container');
    const fontSelect = document.getElementById('font-select');
    const spacingSelect = document.getElementById('spacing-select');
    const lineHeightSelect = document.getElementById('line-height-select');
    const fontSizeSelect = document.getElementById('font-size-select');
    const tintSelect = document.getElementById('tint-select');
    const copyBtn = document.getElementById('copy-btn');
    const printBtn = document.getElementById('print-btn');

    function updateOutput() {
        const text = inputText.value;
        outputContainer.textContent = text || "Your standardized text will appear here...";
        outputContainer.style.fontFamily = fontSelect.value;
        outputContainer.style.letterSpacing = spacingSelect.value;
        outputContainer.style.lineHeight = lineHeightSelect.value;
        outputContainer.style.fontSize = fontSizeSelect.value;
        outputContainer.style.backgroundColor = tintSelect.value;
    }

    inputText.addEventListener('input', updateOutput);
    fontSelect.addEventListener('change', updateOutput);
    spacingSelect.addEventListener('change', updateOutput);
    lineHeightSelect.addEventListener('change', updateOutput);
    fontSizeSelect.addEventListener('change', updateOutput);
    tintSelect.addEventListener('change', updateOutput);

    copyBtn.addEventListener('click', () => {
        const text = outputContainer.textContent;
        if (!text || text === 'Your standardized text will appear here...') return;
        navigator.clipboard.writeText(text).then(() => {
            const orig = copyBtn.textContent;
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = orig; }, 1500);
        }).catch(() => {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = 'Copy Output'; }, 1500);
        });
    });

    printBtn.addEventListener('click', () => window.print());
</script>
</body>
</html>
